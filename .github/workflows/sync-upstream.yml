name: Sync Upstream

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/votkon/gonka-exporter-prometheus.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push origin main

      - name: Sync tags
        run: |
          git fetch upstream --tags
          git push origin --tags
